<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Treasury | Login</title>
  <link rel="stylesheet" href="Styles/index.css" />
</head>
<body>
  <div class="login-wrapper">

    <!-- Left Branding Panel -->
    <div class="login-panel-left">
      <div class="brand-block">
        <div class="brand-logo-box">AT</div>
        <h1>AdminTreasury</h1>
        <p>Secure financial management<br>for your organization</p>
        <div class="brand-divider"></div>
        <ul class="brand-features">
          <li>Track tithes &amp; offerings</li>
          <li>Multi-mission support</li>
          <li>Role-based access control</li>
          <li>Real-time reporting</li>
        </ul>
      </div>
    </div>

    <!-- Right Form Panel -->
    <div class="login-panel-right">
      <div class="login-card">
        <div class="login-header">
          <h2>Welcome back</h2>
          <p>Sign in to your account to continue</p>
        </div>

        <form class="login-form" id="login-form">
          <p id="error-msg" class="error-msg"></p>

          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password" placeholder="••••••••" required />
              <span class="toggle-password" id="toggle-password">
                <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </span>
            </div>
          </div>

          <button type="submit" class="btn-login" id="btn-login">Sign In</button>
        </form>
      </div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="Scripts/supabase.js"></script>
  <script src="Scripts/index.js"></script>
  <script src="Scripts/auth.js"></script>
</body>
</html>
