<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Treasury | Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../Styles/Dashboard.css" />
  <link rel="stylesheet" href="../Styles/Settings.css" />
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-box">AT</div>
          <span>AdminTreasury</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-group">Main Menu</div>
        <a href="Dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
        <a href="Tithes.html" class="nav-item"><i data-lucide="heart"></i> Tithes</a>
        <a href="Offerings.html" class="nav-item"><i data-lucide="hand-coins"></i> Offerings</a>
        <a href="Churches.html" class="nav-item"><i data-lucide="church"></i> Churches</a>
        <div class="nav-group">System</div>
        <a href="Settings.html" class="nav-item active"><i data-lucide="settings"></i> Settings</a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- Topbar -->
      <header class="topbar">
        <div class="page-title">
          <h2>Settings</h2>
          <p class="topbar-date" id="today-date"></p>
        </div>
        <div class="topbar-right">
          <div class="topbar-user">
            <div class="user-info">
              <span id="user-name" class="user-name"></span>
              <span id="user-role" class="user-role"></span>
            </div>
            <div class="avatar" id="user-avatar"></div>
          </div>
          <div class="settings-menu-wrap">
            <button class="settings-burger" id="settings-burger" aria-label="Menu">
              <i data-lucide="menu"></i>
            </button>
            <div class="settings-dropdown" id="settings-dropdown">
              <button class="dropdown-logout" id="logout-btn">
                <i data-lucide="log-out"></i> Logout
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- Settings Content -->
      <div class="settings-wrapper">

        <!-- Profile Info -->
        <div class="settings-card">
          <div class="settings-card-header">
            <div class="card-icon-wrap">
              <i data-lucide="user" width="20" height="20"></i>
            </div>
            <div class="header-text">
              <h3>Profile Information</h3>
              <p>View your account details</p>
            </div>
          </div>
          <div class="profile-grid">
            <div class="profile-field">
              <span class="field-label">Full Name</span>
              <span class="field-value" id="profile-name">—</span>
            </div>
            <div class="profile-field">
              <span class="field-label">Username</span>
              <span class="field-value" id="profile-username">—</span>
            </div>
            <div class="profile-field">
              <span class="field-label">Role</span>
              <span class="field-value" id="profile-role">—</span>
            </div>
            <div class="profile-field">
              <span class="field-label">Mission Code</span>
              <span class="field-value" id="profile-mission">—</span>
            </div>
          </div>
        </div>

        <!-- Change Password -->
        <div class="settings-card">
          <div class="settings-card-header">
            <div class="card-icon-wrap">
              <i data-lucide="lock" width="20" height="20"></i>
            </div>
            <div class="header-text">
              <h3>Change Password</h3>
              <p>Update your login password</p>
            </div>
          </div>
          <form id="change-password-form">
            <p id="pw-msg" class="settings-msg"></p>
            <div class="form-group">
              <label for="current-password">Current Password</label>
              <div class="input-wrapper">
                <input type="password" id="current-password" placeholder="Enter current password" required />
                <span class="toggle-password" data-target="current-password">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                </span>
              </div>
            </div>
            <div class="form-group">
              <label for="new-password">New Password</label>
              <div class="input-wrapper">
                <input type="password" id="new-password" placeholder="Enter new password" required />
                <span class="toggle-password" data-target="new-password">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                </span>
              </div>
            </div>
            <div class="form-group">
              <label for="confirm-password">Confirm New Password</label>
              <div class="input-wrapper">
                <input type="password" id="confirm-password" placeholder="Confirm new password" required />
                <span class="toggle-password" data-target="confirm-password">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                  </svg>
                </span>
              </div>
            </div>
            <button type="submit" class="btn-save" id="btn-save-pw">Update Password</button>
          </form>
        </div>

        <!-- Danger Zone -->
        <div class="settings-card danger-zone">
          <div class="settings-card-header">
            <div class="card-icon-wrap">
              <i data-lucide="shield-alert" width="20" height="20"></i>
            </div>
            <div class="header-text">
              <h3>Session</h3>
              <p>Manage your active session</p>
            </div>
          </div>
          <button class="btn-danger" id="btn-logout-settings">Sign Out of All Sessions</button>
        </div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../Scripts/supabase.js"></script>
  <script src="../Scripts/guard.js"></script>
  <script src="../Scripts/settings.js"></script>
  <script>
    lucide.createIcons();
    const burger = document.getElementById('settings-burger');
    const dropdown = document.getElementById('settings-dropdown');
    burger.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('open');
    });
    document.addEventListener('click', () => dropdown.classList.remove('open'));
  </script>
</body>
</html>
