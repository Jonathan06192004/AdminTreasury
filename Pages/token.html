<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Treasury | Verify Token</title>
  <link rel="stylesheet" href="../Styles/index.css" />
  <link rel="stylesheet" href="../Styles/token.css" />
</head>
<body>
  <div class="login-wrapper">

    <!-- Left Branding Panel -->
    <div class="login-panel-left">
      <div class="brand-block">
        <div class="brand-logo-box">AT</div>
        <h1>AdminTreasury</h1>
        <p>Two-step verification keeps<br>your account secure</p>
        <div class="brand-divider"></div>
        <ul class="brand-features">
          <li>Token-based authentication</li>
          <li>Session-level protection</li>
          <li>Encrypted access control</li>
          <li>Audit-ready login trail</li>
        </ul>
      </div>
    </div>

    <!-- Right Form Panel -->
    <div class="login-panel-right">
      <div class="login-card">

        <div class="token-icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>

        <div class="login-header">
          <h2>Verify Your Token</h2>
          <p id="token-subtitle">Enter the access token assigned to your account</p>
        </div>

        <div class="token-badge" id="token-badge"></div>

        <form class="login-form" id="token-form">
          <p id="token-error" class="error-msg"></p>

          <div class="form-group">
            <label for="token-input">Access Token</label>
            <div class="input-wrapper">
              <input type="password" id="token-input" placeholder="Enter your token" autocomplete="off" required />
              <span class="toggle-password" id="toggle-token">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </span>
            </div>
          </div>

          <button type="submit" class="btn-login" id="btn-verify">Verify Token</button>
        </form>

        <button class="btn-back" id="btn-back">&#8592; Back to Login</button>

      </div>
    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../Scripts/supabase.js"></script>
  <script src="../Scripts/token.js"></script>
</body>
</html>
